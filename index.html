<body>
  <!-- Background canvas layers -->
  <canvas class="bg" id="bgCanvas" aria-hidden="true"></canvas>
  <canvas class="effects" id="effectsCanvas" aria-hidden="true"></canvas>

  <!-- Decorative DOM container for petals/hearts/stars (for CSS animations & emoji elements) -->
  <div class="decor" id="decor"></div>
  <div class="gradient-overlay" aria-hidden="true"></div>

  <!-- Main content -->
  <div class="wrap" role="main">
    <section class="card" id="card" aria-labelledby="proposal-title">
      <div class="title" id="proposal-title">
        <span>🌸</span>
        <span>A Little Question... 🤍</span>
      </div>
      <div class="subtitle small">A genuine heart, no pressure — just a moment.</div>

      <div class="typewriter" id="typewriter" aria-live="polite" aria-atomic="true" tabindex="0">
        <!-- Text filled by JS typewriter -->
        <span id="typedText"></span><span class="cursor" id="cursor"></span>
      </div>

      <div class="actions">
        <button class="btn yes" id="yesBtn" aria-label="Yes, I will">
          <span class="heart">❤️</span> YES
        </button>
        <button class="btn no" id="noBtn" aria-label="No, I decline" aria-disabled="true" tabindex="-1">
          🙈 NO
        </button>
      </div>
    </section>
  </div>

  <!-- Controls: music mute/unmute -->
  <div class="controls" aria-hidden="false">
    <button class="control-btn" id="musicBtn" title="Toggle music" aria-pressed="false">
      🎶
    </button>
    <div class="mute-indicator" id="muteIndicator">Music off</div>
  </div>

  <!-- Celebration overlay -->
  <div class="celebrate" id="celebrate" style="display:none;">
    <div class="message" id="celebrateMessage">
      <h1>💖 Yay!! You made me the happiest person! ❤️</h1>
      <p>Thank you for making this moment unforgettable ❤️</p>
    </div>
  </div>

<script>
/* =========================
   Romantic Proposal - Single File JS
   - Handles typewriter
   - Background animated canvas (particles, stars, sakura)
   - NO button evasive behavior (mouse & touch)
   - YES button celebration (confetti, fireworks, hearts, roses)
   - WebAudio music synthesizer with mute/unmute
   - Well-commented and modular
   ========================= */

(() => {
  'use strict';

  /* ---------- Configuration ---------- */
  const TYPE_TEXT = [
`I don't know where life is taking us,
but I'd love to walk that journey with you.

You make ordinary moments feel special,
and every conversation with you leaves me smiling.

So... can I ask you something?

Will you be my girlfriend?

No pressure.
No rush.

Just a genuine heart hoping for a chance with someone truly special.`
  ];

  // Proximity threshold for NO button (pixels)
  const NO_PROXIMITY = 150;

  // Canvas and particle systems
  const bgCanvas = document.getElementById('bgCanvas');
  const fxCanvas = document.getElementById('effectsCanvas');
  const decor = document.getElementById('decor');
  const typedTextEl = document.getElementById('typedText');
  const cursorEl = document.getElementById('cursor');
  const card = document.getElementById('card');
  const yesBtn = document.getElementById('yesBtn');
  const noBtn = document.getElementById('noBtn');
  const celebrate = document.getElementById('celebrate');
  const celebrateMessage = document.getElementById('celebrateMessage');
  const musicBtn = document.getElementById('musicBtn');
  const muteIndicator = document.getElementById('muteIndicator');

  // Canvas contexts
  let bgCtx, fxCtx;

  // Resize canvases to dpr
  function resizeCanvases() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    [bgCanvas, fxCanvas].forEach(c => {
      c.width = innerWidth * dpr;
      c.height = innerHeight * dpr;
      c.style.width = innerWidth + 'px';
      c.style.height = innerHeight + 'px';
      const ctx = c.getContext('2d');
      ctx.setTransform(dpr,0,0,dpr,0,0);
    });
    bgCtx = bgCanvas.getContext('2d');
    fxCtx = fxCanvas.getContext('2d');
  }
  window.addEventListener('resize', resizeCanvases);
  resizeCanvases();

  /* ---------- Typewriter ---------- */
  // Simulates realistic typing (variable speed, small pauses)
  function startTypewriter(text, onComplete){
    const target = text;
    let i = 0;
    typedTextEl.textContent = '';
    cursorEl.style.display = 'inline-block';
    let paused = false;

    function step(){
      if(i >= target.length){
        cursorEl.style.display = 'none';
        if(onComplete) onComplete();
        return;
      }
      // Simulate human-like speed & pauses
      const ch = target[i++];
      typedTextEl.textContent += ch;
      // longer pause after punctuation/new line
      let delay = 32 + Math.random()*40;
      if(ch === ',' ) delay += 120;
      if(ch === '.' ) delay += 220;
      if(ch === '\n') delay += 360;
      // occasional thinking pause
      if(Math.random() < 0.02) delay += 350 * Math.random();
      setTimeout(step, delay);
    }
    setTimeout(step, 700);
  }

  /* ---------- Decorative floating elements (emoji) ---------- */
  // Create floating sakura petals and hearts periodically
  const MAX_DECOR = 36;
  function spawnFloatingEmoji(kind){
    const el = document.createElement('div');
    el.className = 'floating-emoji';
    el.style.zIndex = 2;
    el.textContent = kind;
    // random start x
    const startX = Math.random()*innerWidth;
    el.style.left = `${startX}px`;
    el.style.top = `${-30 - Math.random()*40}px`;
    const size = 14 + Math.random()*20;
    el.style.fontSize = `${size}px`;
    decor.appendChild(el);

    // animate using requestAnimationFrame for smoothness
    const dx = (-30 + Math.random()*60) / 240; // slight horizontal drift
    const rotate = (Math.random() * 60 - 30);
    const duration = 6000 + Math.random()*8000;
    const start = performance.now();
    function animate(now){
      const t = (now - start) / duration;
      if(t >= 1){
        el.remove();
        return;
      }
      // position & transform
      const y = t * (innerHeight + 100);
      const x = startX + Math.sin(t * Math.PI*2 + Math.random()) * 50 + dx * (now-start);
      const op = 1 - Math.pow(t,0.8);
      el.style.transform = `translate(${x-startX}px, ${y}px) rotate(${rotate * t}deg)`;
      el.style.opacity = op;
      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);
  }

  // burst spawners at intervals
  setInterval(() => {
    if(decor.children.length < MAX_DECOR) spawnFloatingEmoji('🌸');
  }, 600);

  setInterval(() => {
    if(decor.children.length < MAX_DECOR) spawnFloatingEmoji('❤️');
  }, 900);

  /* ---------- Background canvas: gradient, stars, soft particles ---------- */
  let particles = [];
  function initBackgroundParticles(){
    particles = [];
    const count = Math.round((innerWidth * innerHeight) / 60000 * 20) + 30;
    for(let i=0;i<count;i++){
      particles.push({
        x: Math.random()*innerWidth,
        y: Math.random()*innerHeight,
        r: 0.5 + Math.random()*2.2,
        vx: (Math.random()-0.5)*0.1,
        vy: (Math.random()-0.5)*0.1,
        alpha: 0.2 + Math.random()*0.6,
        hue: 320 + Math.random()*60
      });
    }
  }
  initBackgroundParticles();
  window.addEventListener('resize', initBackgroundParticles);

  // twinkling stars positions
  const stars = [];
  function initStars(){
    stars.length = 0;
    for(let i=0;i<60;i++){
      stars.push({
        x: Math.random()*innerWidth,
        y: Math.random()*innerHeight,
        r: 0.5 + Math.random()*1.8,
        phase: Math.random()*Math.PI*2
      });
    }
  }
  initStars();
  window.addEventListener('resize', initStars);

  // animate background
  let lastBg = performance.now();
  function renderBackground(now){
    const dt = now - lastBg;
    lastBg = now;
    // gradient base (subtle animated pink gradient)
    const g = bgCtx.createLinearGradient(0,0,innerWidth,innerHeight);
    g.addColorStop(0, '#ffd6e8');
    g.addColorStop(0.5, '#f8e8ff');
    g.addColorStop(1, '#fff1f6');
    bgCtx.fillStyle = g;
    bgCtx.fillRect(0,0,innerWidth,innerHeight);

    // soft glowing particles
    for(let p of particles){
      p.x += p.vx * dt*0.06;
      p.y += p.vy * dt*0.06;
      if(p.x < -20) p.x = innerWidth+20;
      if(p.x > innerWidth+20) p.x = -20;
      if(p.y < -20) p.y = innerHeight+20;
      if(p.y > innerHeight+20) p.y = -20;
      bgCtx.beginPath();
      const grad = bgCtx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r*10);
      grad.addColorStop(0, `hsla(${p.hue}, 80%, 65%, ${0.28*p.alpha})`);
      grad.addColorStop(1, 'rgba(255,255,255,0)');
      bgCtx.fillStyle = grad;
      bgCtx.fillRect(p.x-p.r*6, p.y-p.r*6, p.r*12, p.r*12);
    }

    // twinkling stars
    for(let s of stars){
      s.phase += dt*0.002;
      const a = 0.6 + Math.sin(s.phase)*0.4;
      bgCtx.beginPath();
      bgCtx.fillStyle = `rgba(255,255,255,${a})`;
      bgCtx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      bgCtx.fill();
    }

    requestAnimationFrame(renderBackground);
  }
  requestAnimationFrame(renderBackground);

  /* ---------- Canvas Effects: Confetti & Fireworks ---------- */
  // We'll maintain multiple particle systems in fxCtx
  const confettiPieces = [];
  const fireworks = [];
  const hearts = []; // little hearts for explosion/celebration

  // Utility random
  const rand = (a,b) => a + Math.random()*(b-a);

  // Confetti piece
  class Confetti {
    constructor(x,y,dx,dy,color){
      this.x = x; this.y = y;
      this.vx = dx; this.vy = dy;
      this.size = rand(6,13);
      this.color = color;
      this.angle = Math.random()*Math.PI*2;
      this.spin = (Math.random()-0.5)*0.2;
      this.life = 160 + Math.random()*80;
    }
    update(){
      this.vy += 0.06; // gravity
      this.x += this.vx;
      this.y += this.vy;
      this.angle += this.spin;
      this.life--;
      this.size *= 0.999;
    }
    draw(ctx){
      ctx.save();
      ctx.translate(this.x,this.y);
      ctx.rotate(this.angle);
      ctx.fillStyle = this.color;
      ctx.fillRect(-this.size/2,-this.size/2,this.size,this.size*0.6);
      ctx.restore();
    }
  }

  // Firework - rocket + particles
  class Firework {
    constructor(sx,sy,tx,ty,color){
      this.x = sx; this.y = sy; this.tx = tx; this.ty = ty;
      this.vx = (tx-sx)/45;
      this.vy = (ty-sy)/45;
      this.life = 45;
      this.color = color;
      this.exploded = false;
    }
    update(){
      if(this.life > 0){
        this.x += this.vx;
        this.y += this.vy;
        this.life--;
      } else if(!this.exploded){
        // explode into particles
        const count = 30 + Math.round(Math.random()*30);
        for(let i=0;i<count;i++){
          const a = Math.random()*Math.PI*2;
          const speed = rand(1,5);
          fireworks.push(new FireParticle(this.x,this.y, Math.cos(a)*speed, Math.sin(a)*speed, this.color));
        }
        this.exploded = true;
      }
    }
    draw(ctx){
      if(!this.exploded){
        ctx.beginPath();
        ctx.fillStyle = this.color;
        ctx.arc(this.x, this.y, 3, 0, Math.PI*2);
        ctx.fill();
      }
    }
  }
  class FireParticle {
    constructor(x,y,vx,vy,color){
      this.x=x; this.y=y; this.vx=vx; this.vy=vy;
      this.color=color; this.life=80+Math.random()*60;
    }
    update(){
      this.vy += 0.02; // gravity
      this.vx *= 0.996;
      this.vy *= 0.996;
      this.x += this.vx;
      this.y += this.vy;
      this.life--;
    }
    draw(ctx){
      ctx.beginPath();
      ctx.fillStyle = this.color;
      ctx.globalCompositeOperation = 'lighter';
      ctx.arc(this.x, this.y, 2, 0, Math.PI*2);
      ctx.fill();
      ctx.globalCompositeOperation = 'source-over';
    }
  }

  // Heart particle used for celebration
  class HeartParticle {
    constructor(x,y,vx,vy,emoji,scale){
      this.x=x; this.y=y; this.vx=vx; this.vy=vy;
      this.emoji = emoji || '❤️';
      this.life = 200 + Math.random()*200;
      this.scale = scale || (0.8 + Math.random()*1.2);
      this.rotation = Math.random()*360;
    }
    update(){
      this.vy += 0.01;
      this.x += this.vx;
      this.y += this.vy;
      this.rotation += 1;
      this.life--;
    }
    draw(ctx){
      // Draw emoji into canvas using fillText (good enough)
      ctx.save();
      ctx.translate(this.x,this.y);
      ctx.rotate(this.rotation * Math.PI/180);
      ctx.font = `${12*this.scale}px serif`;
      ctx.fillText(this.emoji, 0, 0);
      ctx.restore();
    }
  }

  // FX animation loop
  let lastFx = performance.now();
  function renderFX(now){
    const dt = now - lastFx;
    lastFx = now;
    fxCtx.clearRect(0,0,innerWidth,innerHeight);

    // update confetti
    for(let i = confettiPieces.length-1;i>=0;i--){
      const p = confettiPieces[i];
      p.update();
      p.draw(fxCtx);
      if(p.life <= 0 || p.y > innerHeight + 50) confettiPieces.splice(i,1);
    }

    // update fireworks (both rockets and particles)
    for(let i=fireworks.length-1;i>=0;i--){
      const f = fireworks[i];
      f.update();
      f.draw(fxCtx);
      if(f instanceof FireParticle){
        if(f.life <= 0 || f.y > innerHeight + 50) fireworks.splice(i,1);
      } else if(f instanceof Firework){
        if(f.exploded) fireworks.splice(i,1);
      }
    }

    // update hearts
    for(let i=hearts.length-1;i>=0;i--){
      const h = hearts[i];
      h.update();
      h.draw(fxCtx);
      if(h.life <= 0 || h.y > innerHeight + 100) hearts.splice(i,1);
    }

    requestAnimationFrame(renderFX);
  }
  requestAnimationFrame(renderFX);

  // Helper: spawn confetti burst at x,y
  function spawnConfetti(x,y,amount=80){
    const colors = ['#ff9ac9','#ffd1e8','#d18bff','#ffc2c9','#fff1f6'];
    for(let i=0;i<amount;i++){
      const angle = Math.random()*Math.PI*2;
      const speed = rand(2,8);
      const dx = Math.cos(angle)*speed;
      const dy = Math.sin(angle)*speed - rand(1,4);
      const color = colors[Math.floor(Math.random()*colors.length)];
      confettiPieces.push(new Confetti(x,y,dx,dy,color));
    }
  }

  // Helper: spawn fireworks at random top-ish positions

  // spawn heart/rose particles
  function spawnHearts(x,y,count=14,emoji='❤️'){
    for(let i=0;i<count;i++){
      const a = Math.random()*Math.PI*2;
      const speed = rand(0.8,3.5);
      hearts.push(new HeartParticle(x,y, Math.cos(a)*speed, Math.sin(a)*speed - 1.5, emoji, 0.9 + Math.random()*1.2));

  /* ---------- NO Button Evasive Behavior ---------- */
  // Ensure button relocates before pointer/touch arrives.
  function makeNoButtonEvasive(btn){
    // initial style
    btn.style.position = 'relative';
    btn.style.transition = 'transform 360ms cubic-bezier(.18,.9,.27,1)';

    // For positioning inside the card, we'll move via transform translate.
    let current = {x:0,y:0}; // transform offsets
    let busy = false;

    // Compute button center
    function getBtnCenter(){
      const rect = btn.getBoundingClientRect();
      return {x: rect.left + rect.width/2, y: rect.top + rect.height/2, w:rect.width, h:rect.height, rect};
    }

    // Move to a random position within the viewport (clamped)
    function jumpAway(fromX, fromY){
      if(busy) return;
      busy = true;
      const rect = btn.getBoundingClientRect();
      const btnW = rect.width, btnH = rect.height;
      // compute available area: card parent's bounding box or viewport
      const parentRect = card.getBoundingClientRect();
      // We'll position the button absolutely relative to the card by setting transform translate
      // Find new center coordinates within card area but not off-screen
      const minX = parentRect.left + btnW/2 + 8;
      const maxX = parentRect.right - btnW/2 - 8;
      const minY = parentRect.top + btnH/2 + 8;
      const maxY = parentRect.bottom - btnH/2 - 8;

      let newX = rand(minX, maxX);
      let newY = rand(minY, maxY);

      // If too close to the "from" position, nudge farther
      const dx = newX - fromX, dy = newY - fromY;
      if(Math.hypot(dx,dy) < NO_PROXIMITY/1.2){
        newX += (dx>=0?1:-1)*(NO_PROXIMITY*0.8);
        newY += (dy>=0?1:-1)*(NO_PROXIMITY*0.8);
      }

      // clamp
      newX = Math.max(minX, Math.min(maxX, newX));
      newY = Math.max(minY, Math.min(maxY, newY));

      // compute transform
      const cardRect = card.getBoundingClientRect();
      const targetTx = newX - (rect.left + rect.width/2) + current.x;
      const targetTy = newY - (rect.top + rect.height/2) + current.y;

      const rot = rand(-35,35);
      const scale = rand(0.95,1.08);

      // animate using requestAnimationFrame for smoothness: apply transform and bounce after landing
      btn.style.transition = 'transform 420ms cubic-bezier(.18,.9,.27,1)';
      btn.style.transform = `translate(${current.x + targetTx}px, ${current.y + targetTy}px) rotate(${rot}deg) scale(${scale})`;
      // after landed, do bounce
      setTimeout(()=>{
        btn.style.transition = 'transform 420ms cubic-bezier(.22,.6,.2,1)';
        btn.style.transform = `translate(${current.x + targetTx}px, ${current.y + targetTy}px) rotate(${rot}deg) scale(${scale})`;
        // small bounce via keyframes by toggling animation
        btn.animate([
          { transform: btn.style.transform },
          { transform: `translate(${current.x + targetTx}px, ${current.y + targetTy - 14}px) rotate(${rot}deg) scale(${scale + 0.02})`},
          { transform: btn.style.transform }
        ], { duration: 560, easing: 'cubic-bezier(.2,.9,.25,1)' });
        // settle state
        current.x += targetTx;
        current.y += targetTy;
        // ensure within visually safe bounds by clamping current
        busy = false;
      }, 420);
      // small heart spawn for fun
      spawnHearts(newX, newY, 6, '🌹');
    }

    // On pointer move, check proximity
    function onPointerMove(e){
      const pX = e.clientX || (e.touches && e.touches[0] && e.touches[0].clientX) || 0;
      const pY = e.clientY || (e.touches && e.touches[0] && e.touches[0].clientY) || 0;
      const c = getBtnCenter();
      const dist = Math.hypot(c.x - pX, c.y - pY);
      if(dist < NO_PROXIMITY){
        jumpAway(pX, pY);
      }
    }

    // Also handle click attempts (prevent)
    function onClick(e){
      e.preventDefault();
      e.stopPropagation();
      // immediate escape
      const pX = e.clientX || 0, pY = e.clientY || 0;
      jumpAway(pX,pY);
      // play tiny negative sound/feedback? we'll spawn a petal
      spawnFloatingEmoji('🌸');
    }

    // Attach listeners globally for pointermove & touch
    window.addEventListener('pointermove', onPointerMove, {passive:true});
    window.addEventListener('touchstart', onPointerMove, {passive:true});
    window.addEventListener('touchmove', onPointerMove, {passive:true});
    btn.addEventListener('click', onClick, {passive:false});

    // Accessibility: pressing Enter/Space should not "click" it
    btn.addEventListener('keydown', (ev) => {
      if(ev.key === 'Enter' || ev.key === ' '){
        ev.preventDefault();
        // play coy move
        const c = getBtnCenter();
        jumpAway(c.x + 10, c.y + 10);
      }
    });
  }

  let celebrationInterval = null;
  function startFullCelebration(){

  /* ---------- Background Music (WebAudio) ---------- */
  let audioCtx = null, masterGain = null, musicPlaying = false;
  function initAudio(){
    if(audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0;
    masterGain.connect(audioCtx.destination);

    // Create a dreamy chord loop using oscillators and a slow LFO for amplitude
    const bpm = 60;
    const bar = 60 / bpm * 4;
    // simple sequence of frequencies (A, C#, E, B) relative...
    const chordSeq = [
      [440, 554.37, 659.25], // A major-ish
      [392.00, 493.88, 622.25], // G major-ish
      [349.23, 440.00, 523.25]  // F major-ish
    ];

    // Create a scheduled loop using setInterval (simple)
    function playChord(frequencies, length){
      const now = audioCtx.currentTime;
      const localGain = audioCtx.createGain();
      localGain.gain.value = 0;
      localGain.connect(masterGain);

      // gentle attack & release envelope
      localGain.gain.linearRampToValueAtTime(0.0001 + 0.25, now + 0.02);
      localGain.gain.exponentialRampToValueAtTime(0.0001, now + length);

      // add for each frequency an oscillator with slight detune & lowpass
      frequencies.forEach((f, idx) => {
        const osc = audioCtx.createOscillator();
        const type = ['sine','sine','triangle'][idx%3];
        osc.type = type;
        osc.frequency.value = f * (1 + (Math.random()-0.5)*0.0025);
        // vibrato
        const lfo = audioCtx.createOscillator();
        lfo.frequency.value = 5 + Math.random()*2;
        const lfoGain = audioCtx.createGain();
        lfoGain.gain.value = 2.2 + Math.random()*1.2;
        lfo.connect(lfoGain);
        lfoGain.connect(osc.frequency);
        lfo.start();

        // filter
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 1200;
        osc.connect(filter);
        filter.connect(localGain);
        osc.start(now);
        osc.stop(now + length + 0.1);
      });
      // end: localGain will drop gracefully
      setTimeout(()=> { localGain.disconnect(); }, (length+0.2)*1000);
    }

    // loop driver
    let idx = 0;
    const loop = () => {
      if(!musicPlaying) return;
      const freqs = chordSeq[idx % chordSeq.length];
      playChord(freqs, bar * (0.9 + Math.random()*0.2));
      idx++;
      // schedule next
      setTimeout(loop, bar*1000);
    };
    // expose start function
    audioCtx._startLoop = loop;
  }

  // Toggle music
  musicBtn.addEventListener('click', async (e) => {
    e.preventDefault();
    if(!audioCtx) initAudio();
    if(audioCtx.state === 'suspended'){

      await audioCtx.resume();
